name: Codex Review Gate

on:
  pull_request:
    types: [opened, ready_for_review]
  pull_request_review:
    types: [submitted]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  codex-review-gate:
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.user.login == 'chatgpt-codex-connector[bot]')
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Codex review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          echo "Waiting for Codex review on PR #$PR_NUMBER..."
          for i in $(seq 1 60); do
            REVIEW=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
              --jq '[.[] | select(.user.login == "chatgpt-codex-connector[bot]")] | length')
            if [ "$REVIEW" -gt 0 ]; then
              echo "Codex review found."
              exit 0
            fi
            echo "Attempt $i/60 — no review yet, waiting 30s..."
            sleep 30
          done
          echo "Timed out waiting for Codex review after 30 minutes."
          exit 1
